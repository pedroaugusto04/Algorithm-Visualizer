name: Deploy Backend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'scripts/deploy/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Backend to VPS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate backend env file
        env:
          APPLICATION_NAME: ${{ secrets.APPLICATION_NAME }}
          DB_URL: jdbc:mysql://mysql:3306/${{ vars.AV_MYSQL_DATABASE || 'db_algorithm_visualizer' }}?useSSL=false&allowPublicKeyRetrieval=true
          DB_USER: ${{ secrets.AV_MYSQL_USER }}
          DB_PASSWORD: ${{ secrets.AV_MYSQL_PASSWORD }}
          DDL_MODE: ${{ vars.DDL_MODE || 'update' }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ vars.JWT_ISSUER || 'algorithm_visualizer_api' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          AV_MYSQL_DATABASE: ${{ vars.AV_MYSQL_DATABASE || 'db_algorithm_visualizer' }}
          AV_MYSQL_ROOT_PASSWORD: ${{ secrets.AV_MYSQL_ROOT_PASSWORD }}
          AV_MYSQL_USER: ${{ secrets.AV_MYSQL_USER }}
          AV_MYSQL_PASSWORD: ${{ secrets.AV_MYSQL_PASSWORD }}
          AV_MYSQL_PORT: ${{ vars.AV_MYSQL_PORT || '3306' }}
          AV_API_PORT: ${{ vars.AV_API_PORT || '8083' }}
        run: bash scripts/deploy/generate-backend-env.sh .deploy/backend.env

      - name: Validate production environment config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_GITHUB_REPO_TOKEN: ${{ secrets.VPS_GITHUB_REPO_TOKEN }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || { echo "Missing secret: VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing secret: VPS_USER"; exit 1; }
          test -n "$VPS_SSH_PORT" || { echo "Missing secret/variable: VPS_SSH_PORT"; exit 1; }
          test -n "$VPS_SSH_PRIVATE_KEY" || { echo "Missing secret: VPS_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$VPS_GITHUB_REPO_TOKEN" || { echo "Missing secret: VPS_GITHUB_REPO_TOKEN"; exit 1; }
          test -n "$VPS_APP_DIR" || { echo "Missing variable: VPS_APP_DIR"; exit 1; }

      - name: Ensure rsync is available on GitHub runner
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Prepare SSH for VPS sync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
          SERVER_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%b\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" \
            "command -v rsync >/dev/null 2>&1 || { echo 'rsync nao encontrado no servidor remoto'; exit 1; }; mkdir -p \"$VPS_APP_DIR\""

      - name: Sync backend env to VPS
        env:
          SERVER_HOST: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
          SERVER_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT -o StrictHostKeyChecking=yes" \
            .deploy/backend.env "$SERVER_USER@$SERVER_HOST:$VPS_APP_DIR/backend.env"

      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v1.2.4
        env:
          VPS_GITHUB_REPO_TOKEN: ${{ secrets.VPS_GITHUB_REPO_TOKEN }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: VPS_GITHUB_REPO_TOKEN,VPS_APP_DIR
          script: |
            set -euo pipefail
            cd "$VPS_APP_DIR"
            chmod 600 backend.env
            cp backend.env .env.prod
            REPO_URL="https://x-access-token:${VPS_GITHUB_REPO_TOKEN}@github.com/${{ github.repository }}.git"
            if [ ! -d ".git" ]; then
              git init
              git remote add origin "$REPO_URL"
            fi
            git remote set-url origin "$REPO_URL"
            git fetch --all --prune
            git checkout -B main origin/main
            git reset --hard origin/main
            cp backend.env .env.prod
            sudo docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build --remove-orphans mysql api
            sudo docker image prune -f